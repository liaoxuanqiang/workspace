name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Configure Core RDP Settings
        run: |
          # 启用远程桌面，禁用网络级身份认证（如需）
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force

          # 删除已有同名规则避免重复
          netsh advfirewall firewall delete rule name="RDP-Tailscale"
          
          # 测试用：允许所有 3389 端口的入站连接
          netsh advfirewall firewall add rule name="RDP-Tailscale" `
            dir=in action=allow protocol=TCP localport=3389

          # （可选）重启远程桌面服务使变更生效
          Restart-Service -Name TermService -Force

      - name: Create RDP User with Secure Password
        run: |
          # 生成 8 位密码（大小写字母 + 数字）
          $charSet = [char[]](65..90) + [char[]](97..122) + [char[]](48..57)  # A-Z a-z 0-9
          $password = -join ($charSet | Get-Random -Count 8)
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "liaox" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "liaox"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "liaox"
          
          echo "RDP_CREDS=User: liaox | Password: $password" >> $env:GITHUB_ENV
          
          if (-not (Get-LocalUser -Name "liaox")) {
              Write-Error "User creation failed"
              exit 1
          }

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.98.8-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      - name: Establish Tailscale Connection
        run: |
          # 获取本机所有网卡的 IPv4 地址，用于 Subnet Router
          $localIPs = Get-NetIPAddress -AddressFamily IPv4 | Where-Object { $_.IPAddress -ne '127.0.0.1' }
          
          # 计算需要广播的子网路由
          $subnets = @()
          foreach ($ip in $localIPs) {
              $cidr = (Get-NetIPAddress -IPAddress $ip.IPAddress -AddressFamily IPv4).PrefixLength
              $subnets += "$($ip.IPAddress)/$cidr"
          }
          $advertiseRoutes = $subnets -join ','
          Write-Host "Advertise Routes: $advertiseRoutes"

          # 使用认证密钥启动 Tailscale，同时开启 Subnet Router 和 Exit Node
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
            --hostname=gh-runner-$env:GITHUB_RUN_ID `
            --advertise-routes="$advertiseRoutes" `
            --advertise-exit-node `
            --accept-routes `
            --accept-dns=false

          # 等待 Tailscale 分配 IP
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }
          
          if (-not $tsIP) {
              Write-Error "Tailscale IP not assigned. Exiting."
              exit 1
          }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV
          
          # 输出 Tailscale 状态确认功能已开启
          Write-Host "=== Tailscale Status ==="
          & "$env:ProgramFiles\Tailscale\tailscale.exe" status
          Write-Host "Subnet Router and Exit Node enabled."
      
      - name: Verify RDP Accessibility
        run: |
          Write-Host "Tailscale IP: $env:TAILSCALE_IP"
          
          # 使用 Test-NetConnection 测试 Tailscale IP 的 3389 端口连通性
          $testResult = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389
          if (-not $testResult.TcpTestSucceeded) {
              Write-Error "TCP connection to RDP port 3389 failed"
              exit 1
          }
          Write-Host "TCP connectivity successful!"

      - name: Maintain Connection
        run: |
          Write-Host "`n=== RDP ACCESS ==="
          Write-Host "Address: $env:TAILSCALE_IP"
          Write-Host "Username: liaox"
          Write-Host "Password: $(echo $env:RDP_CREDS)"
          Write-Host "==================`n"
          
          # 保持 runner 持续运行（或直到手动取消）
          while ($true) {
              Write-Host "[$(Get-Date)] RDP Active - Use Ctrl+C in workflow to terminate"
              Start-Sleep -Seconds 300
          }
          ```
