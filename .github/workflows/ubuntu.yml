name: ubuntu

on:
  workflow_dispatch:

jobs:
  ubuntu-novnc:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Configure apt and install dependencies
        run: |
          # 使用非交互模式，避免 tzdata 等包弹出交互
          export DEBIAN_FRONTEND=noninteractive

          # 更新 apt 索引
          sudo apt-get update -y

          # 检查是否已有桌面环境，如已安装则跳过 xfce4 安装
          if command -v xfce4-session >/dev/null 2>&1 || command -v gnome-session >/dev/null 2>&1 || command -v startplasma >/dev/null 2>&1 || [ -f /usr/bin/xfce4-session ]; then
            echo "Desktop environment already installed, skipping xfce4 installation."
          else
            echo "No desktop environment detected, installing Xfce4..."
            # 安装 Xfce4 轻量桌面环境（最小化安装，避免拉一堆无用软件）
            sudo apt-get install -y --no-install-recommends \
              xfce4 xfce4-terminal xfce4-taskmanager
          fi

          # 安装 TigerVNC Server（VNC 后端）和工具（含 vncpasswd）
          sudo apt-get install -y --no-install-recommends tigervnc-standalone-server tigervnc-common tigervnc-tools

          # 安装 noVNC 与 websockify（Web 客户端）
          sudo apt-get install -y --no-install-recommends novnc websockify

          # 一些常用的桌面辅助工具
          sudo apt-get install -y --no-install-recommends \
            dbus-x11 x11-utils firefox espeak jq

      - name: Create VNC user
        env:
          VNC_USERNAME: ${{ secrets.VNC_USERNAME }}
          VNC_PASSWORD: ${{ secrets.VNC_PASSWORD }}
        run: |
          if [ -z "$VNC_USERNAME" ]; then
            echo "::error::VNC_USERNAME is not configured in GitHub Secrets. Please add it."
            exit 1
          fi
          # Create user with home directory
          sudo useradd -m -s /bin/bash "$VNC_USERNAME"
          # Set password to match VNC_PASSWORD
          echo "$VNC_USERNAME:$VNC_PASSWORD" | sudo chpasswd
          # Add to sudo group for convenience
          sudo usermod -aG sudo "$VNC_USERNAME"
          # Create user runtime directory
          sudo mkdir -p /run/user/$(id -u "$VNC_USERNAME")
          sudo chmod 700 /run/user/$(id -u "$VNC_USERNAME")
          echo "User $VNC_USERNAME created successfully."

      - name: Configure TigerVNC server
        env:
          VNC_USERNAME: ${{ secrets.VNC_USERNAME }}
          VNC_PASSWORD: ${{ secrets.VNC_PASSWORD }}
        run: |
          # 验证 VNC_USERNAME 是否已配置
          if [ -z "$VNC_USERNAME" ]; then
            echo "::error::VNC_USERNAME is not configured in GitHub Secrets. Please add it."
            exit 1
          fi

          # 验证 VNC_PASSWORD 是否已配置
          if [ -z "$VNC_PASSWORD" ]; then
            echo "::error::VNC_PASSWORD is not configured in GitHub Secrets. Please add it."
            exit 1
          fi

          # VNC 显示号 :1 => 监听 5901
          VNC_DISPLAY=":1"
          VNC_PORT=5901

          # 获取 VNC 用户的家目录
          VNC_USER_HOME=$(eval echo ~$VNC_USERNAME)

          # 创建用户 .vnc 目录
          sudo -u "$VNC_USERNAME" mkdir -p "$VNC_USER_HOME/.vnc"

          # 预创建用户运行时目录（避免 XFCE session 报错）
          sudo mkdir -p /run/user/$(id -u "$VNC_USERNAME")
          sudo chmod 700 /run/user/$(id -u "$VNC_USERNAME")

          # 使用 vncpasswd 生成 VNC 密码文件
          printf '%s' "$VNC_PASSWORD" | sudo vncpasswd -f | sudo tee "$VNC_USER_HOME/.vnc/passwd" > /dev/null
          sudo chmod 600 "$VNC_USER_HOME/.vnc/passwd"

          # 写入 xstartup 脚本
          sudo tee "$VNC_USER_HOME/.vnc/xstartup" << 'XSTARTUP' > /dev/null
          #!/bin/bash
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          export XDG_SESSION_TYPE=x11
          export XDG_CONFIG_DIRS="/etc/xdg"

          VNC_USER="$(whoami)"
          USER_UID=$(id -u "$VNC_USER")

          # 设置用户运行时目录
          export XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/user/$USER_UID}"
          if [ ! -d "$XDG_RUNTIME_DIR" ]; then
            mkdir -p "$XDG_RUNTIME_DIR" 2>/dev/null || true
            chmod 700 "$XDG_RUNTIME_DIR" 2>/dev/null || true
          fi

          # 确保 dbus 已启动
          if [ -z "$DBUS_SESSION_BUS_ADDRESS" ] && command -v dbus-launch >/dev/null 2>&1; then
            eval "$(dbus-launch --sh-syntax)"
          fi

          exec startxfce4
          XSTARTUP

          # 写入 VNC 配置（分辨率、色深、仅监听 localhost）
          sudo tee "$VNC_USER_HOME/.vnc/config" << 'VNCCONFIG' > /dev/null
          geometry=1280x720
          depth=24
          localhost=yes
          VNCCONFIG

          # 确保 .vnc 目录及所有文件属于 VNC 用户
          sudo chown -R "$VNC_USERNAME:$VNC_USERNAME" "$VNC_USER_HOME/.vnc"

          # 让 VNC 监听 localhost（noVNC/websockify 会转发）
          echo "VNC_DISPLAY=$VNC_DISPLAY" >> "$GITHUB_ENV"
          echo "VNC_PORT=$VNC_PORT" >> "$GITHUB_ENV"

      - name: Start VNC server
        env:
          VNC_USERNAME: ${{ secrets.VNC_USERNAME }}
        run: |
          if [ -z "$VNC_USERNAME" ]; then
            echo "::error::VNC_USERNAME is not configured in GitHub Secrets."
            exit 1
          fi

          VNC_USER_HOME=$(eval echo ~$VNC_USERNAME)

          # 以 VNC 用户身份启动 VNC，绑定到 localhost
          sudo -u "$VNC_USERNAME" vncserver "$VNC_DISPLAY" -localhost yes -geometry 1280x720 -depth 24

          # 等待 VNC 端口就绪
          for i in $(seq 1 20); do
            if ss -ltn | grep -q ":$VNC_PORT "; then
              echo "VNC server is listening on port $VNC_PORT"
              break
            fi
            sleep 1
          done

          if ! ss -ltn | grep -q ":$VNC_PORT "; then
            echo "::error::VNC server failed to start on $VNC_DISPLAY"
            # 不使用双引号包裹 glob，否则通配符无法展开
            cat $VNC_USER_HOME/.vnc/*:1.log 2>/dev/null || true
            exit 1
          fi

      - name: Start noVNC / websockify
        run: |
          # noVNC 默认 Web 端口 6080
          NOVNC_PORT=6080
          echo "NOVNC_PORT=$NOVNC_PORT" >> "$GITHUB_ENV"

          # 找到 noVNC 的安装路径
          NOVNC_PATH=$(find /usr/share/novnc -name "vnc.html" 2>/dev/null | head -n1 | xargs dirname 2>/dev/null || true)
          if [ -z "$NOVNC_PATH" ] || [ ! -d "$NOVNC_PATH" ]; then
            # 某些发行版路径不同
            NOVNC_PATH="/usr/share/novnc"
          fi
          echo "noVNC web root: $NOVNC_PATH"

          # 启动 websockify，将 6080 转发到本地 VNC 端口
          nohup websockify --web="$NOVNC_PATH" "$NOVNC_PORT" "localhost:$VNC_PORT" \
            > /tmp/websockify.log 2>&1 &

          # 等待 websockify 就绪
          for i in $(seq 1 20); do
            if ss -ltn | grep -q ":$NOVNC_PORT "; then
              echo "noVNC/websockify is listening on port $NOVNC_PORT"
              break
            fi
            sleep 1
          done

          if ! ss -ltn | grep -q ":$NOVNC_PORT "; then
            echo "::error::websockify failed to start"
            cat /tmp/websockify.log || true
            exit 1
          fi

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

          # 确保 tailscaled 服务启动
          sudo systemctl enable --now tailscaled

      - name: Authenticate Tailscale
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          if [ -z "$TAILSCALE_AUTH_KEY" ]; then
            echo "::error::TAILSCALE_AUTH_KEY is not configured in GitHub Secrets."
            exit 1
          fi

          echo "TAILSCALE_AUTH_KEY is configured. Authenticating Tailscale..."

          sudo tailscale up \
            --authkey="$TAILSCALE_AUTH_KEY" \
            --hostname="ubuntu" \
            --ssh

          # 等待 Tailscale 分配 IP
          TS_IP=""
          for i in $(seq 1 10); do
            TS_IP=$(sudo tailscale ip -4 || true)
            if [ -n "$TS_IP" ]; then
              break
            fi
            sleep 5
          done

          if [ -z "$TS_IP" ]; then
            echo "::error::Tailscale authentication failed. IP not assigned."
            sudo tailscale status || true
            exit 1
          fi

          echo "TAILSCALE_IP=$TS_IP" >> "$GITHUB_ENV"
          echo "Tailscale authenticated successfully! IP: $TS_IP"

      - name: Set Machine Name and IP via Tailscale API
        env:
          TAILSCALE_API_TOKEN: ${{ secrets.TAILSCALE_API_TOKEN }}
        run: |
          if [ -z "$TAILSCALE_API_TOKEN" ]; then
            echo "::error::TAILSCALE_API_TOKEN is not configured in GitHub Secrets."
            exit 1
          fi

          echo "TAILSCALE_API_TOKEN is configured. Getting Device ID..."

          # 从本地 tailscale status 获取 Stable Node ID（如 nNSNdatHXZ11CNTRL）
          STABLE_NODE_ID=$(sudo tailscale status --json | jq -r '.Self.ID')
          if [ -z "$STABLE_NODE_ID" ] || [ "$STABLE_NODE_ID" = "null" ]; then
            echo "::error::Could not determine Stable Node ID."
            exit 1
          fi
          echo "Stable Node ID: $STABLE_NODE_ID"

          API_BASE="https://api.tailscale.com/api/v2"
          AUTH_HEADER="Authorization: Bearer $TAILSCALE_API_TOKEN"

          # 通过 API 获取设备列表，用 nodeId（StableID）匹配出当前设备的数值型 Device ID
          echo "Fetching device list from API to resolve numeric Device ID..."
          DEVICES_JSON=$(curl -s -H "$AUTH_HEADER" "$API_BASE/tailnet/-/devices")
          DEVICE_ID=$(echo "$DEVICES_JSON" | jq -r --arg NODE "$STABLE_NODE_ID" '.devices[] | select(.nodeId == $NODE) | .id')
          if [ -z "$DEVICE_ID" ] || [ "$DEVICE_ID" = "null" ]; then
            echo "::error::Could not find current device in API device list."
            echo "Available devices:"
            echo "$DEVICES_JSON" | jq -r '.devices[] | "\(.name) (\(.id)) nodeId=\(.nodeId)"'
            exit 1
          fi
          echo "Resolved numeric Device ID: $DEVICE_ID"
          echo "TAILSCALE_DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"

          # 1. 检查是否已有名为 "ubuntu" 的设备，如有则先取消授权并移除
          echo "Checking for existing device named 'ubuntu'..."
          EXISTING_UBUNTU_IDS=$(echo "$DEVICES_JSON" | jq -r --arg ID "$DEVICE_ID" '.devices[] | select(.name == "ubuntu" and .id != ($ID | tonumber? // .)) | .id')
          if [ -n "$EXISTING_UBUNTU_IDS" ]; then
            echo "Found existing device(s) named 'ubuntu':"
            while IFS= read -r OLD_ID; do
              if [ -n "$OLD_ID" ]; then
                echo "  Deauthorizing old device: $OLD_ID..."
                curl -s -f -X POST "$API_BASE/device/$OLD_ID/deauthorize" \
                  -H "$AUTH_HEADER" || echo "::warning::Failed to deauthorize device $OLD_ID"
                echo "  Removing old device: $OLD_ID..."
                curl -s -f -X DELETE "$API_BASE/device/$OLD_ID" \
                  -H "$AUTH_HEADER" || echo "::warning::Failed to remove device $OLD_ID"
                echo "  ✅ Device $OLD_ID removed."
              fi
            done <<< "$EXISTING_UBUNTU_IDS"
          else
            echo "No existing device named 'ubuntu' found via API."
          fi

          # 2. 尝试通过 API 重命名
          echo "Setting machine name to 'ubuntu' via API..."
          RENAME_RESULT=$(curl -s -f -X POST "$API_BASE/device/$DEVICE_ID/name" \
            -H "$AUTH_HEADER" \
            -H "Content-Type: application/json" \
            -d '{"name":"ubuntu"}' 2>&1) || true
          if echo "$RENAME_RESULT" | grep -q "already taken"; then
            echo "::warning::Name 'ubuntu' already taken by another device."
            echo "Trying to find and remove the conflicting device using Stable Node ID..."
            # 通过 tailscale status --json 获取所有已知设备
            ALL_KNOWN=$(sudo tailscale status --json 2>/dev/null | jq -r '.Peer // {} | to_entries[] | "\(.key) \(.value.HostName)"' 2>/dev/null || true)
            if [ -n "$ALL_KNOWN" ]; then
              OLD_NODE=$(echo "$ALL_KNOWN" | grep -i " ubuntu$" | head -1 | awk '{print $1}')
              if [ -n "$OLD_NODE" ]; then
                echo "Found conflicting device with Node ID: $OLD_NODE"
                OLD_DEV_ID=$(echo "$DEVICES_JSON" | jq -r --arg NODE "$OLD_NODE" '.devices[] | select(.nodeId == $NODE) | .id')
                if [ -n "$OLD_DEV_ID" ] && [ "$OLD_DEV_ID" != "null" ]; then
                  echo "Deauthorizing device: $OLD_DEV_ID..."
                  curl -s -f -X POST "$API_BASE/device/$OLD_DEV_ID/deauthorize" -H "$AUTH_HEADER" || true
                  echo "Removing device: $OLD_DEV_ID..."
                  curl -s -f -X DELETE "$API_BASE/device/$OLD_DEV_ID" -H "$AUTH_HEADER" || true
                  echo "Retrying rename..."
                  RENAME_RESULT=$(curl -s -f -X POST "$API_BASE/device/$DEVICE_ID/name" \
                    -H "$AUTH_HEADER" \
                    -H "Content-Type: application/json" \
                    -d '{"name":"ubuntu"}' 2>&1) || true
                  echo "Rename result: $RENAME_RESULT"
                fi
              fi
            fi
            if echo "$RENAME_RESULT" | grep -q "already taken"; then
              echo "::warning::API rename still failed. Falling back to tailscale set --hostname=ubuntu..."
              sudo tailscale set --hostname=ubuntu || echo "::warning::tailscale set --hostname also failed"
            fi
          else
            echo "✅ Machine name set to 'ubuntu' via API."
          fi

          # 4. 设置机器 IP：Tailscale CLI/API v2 不提供设置 IP 的接口
          #    Tailscale 自动分配 IP，如需固定 IP 请在 Admin Console 中设置
          #    （每个设备注册到同一 tailnet 会获得相同的稳定 IP，不需要手动设置）
          echo "IP is automatically assigned by Tailscale (stable per device)."
          echo "To set a fixed IP, use the Admin Console (no CLI/API v2 endpoint exists)."

          echo "Tailscale API configuration completed!"

      - name: Ensure MagicDNS is Enabled
        env:
          TAILSCALE_API_TOKEN: ${{ secrets.TAILSCALE_API_TOKEN }}
        run: |
          if [ -z "$TAILSCALE_API_TOKEN" ]; then
            echo "::error::TAILSCALE_API_TOKEN is not configured in GitHub Secrets."
            exit 1
          fi

          API_BASE="https://api.tailscale.com/api/v2"
          AUTH_HEADER="Authorization: Bearer $TAILSCALE_API_TOKEN"
          TAILNET="-"

          echo "Checking MagicDNS status..."

          # 查询当前 tailnet 设置
          SETTINGS=$(curl -s -H "$AUTH_HEADER" "$API_BASE/tailnet/$TAILNET/settings")
          MAGIC_DNS_ENABLED=$(echo "$SETTINGS" | jq -r '.magicDNSEnabled // false')
          echo "MagicDNS enabled: $MAGIC_DNS_ENABLED"

          # 获取 MagicDNS 域名后缀
          TAILNET_DOMAIN=$(sudo tailscale status --json | jq -r '.MagicDNSSuffix // empty')
          echo "Tailnet domain: $TAILNET_DOMAIN"

          if [ "$MAGIC_DNS_ENABLED" != "true" ]; then
            echo "MagicDNS is NOT enabled. Enabling now..."
            curl -s -X PATCH "$API_BASE/tailnet/$TAILNET/settings" \
              -H "$AUTH_HEADER" \
              -H "Content-Type: application/json" \
              -d '{"magicDNSEnabled":true}' || echo "::warning::Failed to enable MagicDNS"

            # 重新查询确认
            SETTINGS_CHECK=$(curl -s -H "$AUTH_HEADER" "$API_BASE/tailnet/$TAILNET/settings")
            MAGIC_DNS_ENABLED=$(echo "$SETTINGS_CHECK" | jq -r '.magicDNSEnabled // false')
            echo "MagicDNS enabled (verified): $MAGIC_DNS_ENABLED"
          else
            echo "MagicDNS is already enabled."
          fi

          # 输出 MagicDNS 域名到环境变量
          if [ -n "$TAILNET_DOMAIN" ]; then
            FULL_DNS="ubuntu.$TAILNET_DOMAIN"
            echo "TAILSCALE_DNS=$FULL_DNS" >> "$GITHUB_ENV"
            echo "MagicDNS name: $FULL_DNS"
          else
            echo "::warning::Could not determine MagicDNS domain."
          fi

          echo "MagicDNS check completed!"

      - name: Enable Subnet Router and Exit Node
        run: |
          echo "Enabling Subnet Router and Exit Node..."

          # 获取本机 IPv4 地址，计算子网
          # 使用 Python 的 ipaddress 模块（跨版本兼容，无需 ipcalc）
          ADVERTISE_ROUTES=$(printf '%s\n' \
            'import ipaddress, subprocess, sys' \
            'out = subprocess.run(["ip", "-4", "-o", "addr", "show", "scope", "global"], capture_output=True, text=True).stdout' \
            'addrs = []' \
            'for line in out.strip().split(chr(10)):' \
            '    parts = line.strip().split()' \
            '    if len(parts) >= 4:' \
            '        cidr = parts[3]' \
            '        net = ipaddress.IPv4Network(cidr, strict=False)' \
            '        addrs.append(str(net))' \
            'print(",".join(addrs))' \
            | python3)
          echo "Advertise Routes: $ADVERTISE_ROUTES"

          sudo tailscale set \
            --advertise-routes="$ADVERTISE_ROUTES" \
            --advertise-exit-node \
            --accept-routes \
            --accept-dns=false

          echo "=== Tailscale Status ==="
          sudo tailscale status
          echo "Subnet Router and Exit Node enabled."

      - name: Verify noVNC Accessibility
        run: |
          echo "Tailscale IP: $TAILSCALE_IP"
          echo "noVNC port: $NOVNC_PORT"

          # 测试本地 noVNC 端口连通性
          if ! ss -ltn | grep -q ":$NOVNC_PORT "; then
            echo "::error::noVNC port $NOVNC_PORT is not listening"
            exit 1
          fi
          echo "noVNC/websockify is listening on port $NOVNC_PORT"

          # 检测 Tailscale 接口和 IP
          echo ""
          echo "=== Tailscale Connectivity Check ==="
          echo "Checking Tailscale interface..."
          ip addr show tailscale0 2>/dev/null || echo "::warning::tailscale0 interface not found"

          # 通过 Tailscale IP 访问 noVNC
          if [ -n "$TAILSCALE_IP" ]; then
            echo "Testing noVNC via Tailscale IP: http://$TAILSCALE_IP:$NOVNC_PORT/vnc.html"
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 "http://$TAILSCALE_IP:$NOVNC_PORT/vnc.html" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ noVNC is accessible via Tailscale IP (HTTP $HTTP_CODE)"
            else
              echo "::warning::noVNC returned HTTP $HTTP_CODE via Tailscale IP"
              echo "Check Tailscale ACLs: ensure inbound access to port $NOVNC_PORT is allowed."
            fi
          else
            echo "::warning::TAILSCALE_IP is not set, skipping connectivity check"
          fi

          # 检查 websockify 日志
          echo ""
          echo "=== websockify startup log ==="
          cat /tmp/websockify.log 2>/dev/null || echo "(no log file found)"
          echo ""
          echo "=== Connectivity check completed ==="

      - name: Maintain Connection
        env:
          VNC_USERNAME: ${{ secrets.VNC_USERNAME }}
          VNC_PASSWORD: ${{ secrets.VNC_PASSWORD }}
        run: |
          echo ""
          echo "=== noVNC Cloud Desktop ACCESS ==="
          echo "Web URL (Tailscale IP):   http://$TAILSCALE_IP:$NOVNC_PORT/vnc.html"
          if [ -n "$TAILSCALE_DNS" ]; then
            echo "Web URL (MagicDNS):       http://$TAILSCALE_DNS:$NOVNC_PORT/vnc.html"
          fi
          echo ""
          echo "VNC IP:   $TAILSCALE_IP"
          echo "VNC Port: $VNC_PORT  (for VNC client)"
          echo "Username: $VNC_USERNAME"
          echo "Password: $VNC_PASSWORD"
          echo "================================="
          echo ""

          # 监控 VNC 进程是否存活
          while true; do
            echo "[$(date)] Desktop Active - Use Ctrl+C in workflow to terminate"
            # 检查关键进程
            if ! pgrep -x vncserver >/dev/null 2>&1 && ! pgrep -f "Xvnc" >/dev/null 2>&1; then
              echo "::warning::VNC server process not found, attempting restart..."
              sudo -u "$VNC_USERNAME" vncserver "$VNC_DISPLAY" -localhost yes -geometry 1280x720 -depth 24 || true
            fi
            if ! pgrep -x websockify >/dev/null 2>&1; then
              echo "::warning::websockify process not found, attempting restart..."
              NOVNC_PATH=$(find /usr/share/novnc -name "vnc.html" 2>/dev/null | head -n1 | xargs dirname 2>/dev/null || echo "/usr/share/novnc")
              nohup websockify --web="$NOVNC_PATH" "$NOVNC_PORT" "localhost:$VNC_PORT" > /tmp/websockify.log 2>&1 &
            fi
            sleep 300
          done
